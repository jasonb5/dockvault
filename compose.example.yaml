services:
  dockvault:
    build:
      context: .
    container_name: dockvault
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RESTIC_PASSWORD: change-me
      DOCKVAULT_HOSTNAME: dockvault
      DOCKVAULT_MAX_CONCURRENT_BACKUPS: "1"
      DOCKVAULT_RETENTION_SCHEDULE: "30 3 * * *"
      DOCKVAULT_RETENTION_ARGS: "--keep-last 7 --keep-daily 14 --keep-weekly 8"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/restic:/srv/restic
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
