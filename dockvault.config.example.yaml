defaults:
  repository:
    type: local
    password_env: RESTIC_PASSWORD
  retention:
    keep_last: 7
    keep_daily: 14
    keep_weekly: 8

jobs:
  media:
    source:
      type: files
      volume_name: media_data
    schedule: "0 1 * * *"
    repository:
      path: /srv/restic/media

  photos:
    source:
      type: files
      volume_name: photos_data
    schedule: "0 2 * * *"
    repository:
      path: /srv/restic/photos
